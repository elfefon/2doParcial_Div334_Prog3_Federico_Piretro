<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camisetas unicas</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&display=swap" rel="stylesheet">
    <link rel="shortcut icon" href="src/img/favicon.ico" type="image/x-icon">
    <script>
        (function() {
            if (localStorage.getItem("theme") === "dark") {
                document.documentElement.setAttribute("data-theme", "dark");
            }
        })();
    </script>
</head>
<body class="pagina-bienvenida">
    <header class="header-bienvenida">
        <nav class="navbar-bienvenida">
            <div class="logo-container">
                <img src="src/img/logoPaginaPelota.jpg" class="logo-img" alt="Logo Pelota">
            </div>

            <div class="logo">
                <a href="" class="mynerve-regular">Remeras deportivas</a>
            </div>

            <button class="theme-toggle" onclick="toggleTheme()" title="Cambiar tema">☾</button>
        </nav>
    </header>

    <main class="main-bienvenida">
    
        <h1>Bienvenidx!</h1>

        <h4>Introducí tu nombre</h4>
        <form id="form-bienvenida">
            <input type="text" id="bienvenida-nombre">
            <input class="btn-enviar" type="submit" value="Enviar">
        </form>

    </main>

    <script>
        // Formulario bienvenida
        let formBienvenida = document.getElementById("form-bienvenida");
        formBienvenida.addEventListener("submit", event => {
            event.preventDefault(); // Evitamos el envio por defecto del formulario

            // Extraemos el valor del campo de texto
            let nombreUsuario = document.getElementById("bienvenida-nombre").value;

            if(nombreUsuario.length > 0) {
                sessionStorage.setItem("nombreUsuario", nombreUsuario);
                window.location.href = "productos.html";
            }
        })
    </script>

    <script>
        function toggleTheme() {
            const html = document.documentElement;
            const btn = document.querySelector(".theme-toggle");
            if (html.getAttribute("data-theme") === "dark") {
                html.removeAttribute("data-theme");
                localStorage.setItem("theme", "light");
                btn.textContent = "\u263E";
            } else {
                html.setAttribute("data-theme", "dark");
                localStorage.setItem("theme", "dark");
                btn.textContent = "\u2600";
            }
        }
        (function() {
            const btn = document.querySelector(".theme-toggle");
            if (document.documentElement.getAttribute("data-theme") === "dark") {
                btn.textContent = "\u2600";
            } else {
                btn.textContent = "\u263E";
            }
        })();
    </script>

    <div class="footer">
        <div class="top-bullet"></div>
        <div class="rule rule-top"></div>
        <div class="eyebrow">Programacion III &middot; UTN FRA</div>
        <div class="title-row">
        <div class="title">Federico Piretro</div>
        </div>
        <div class="tagline">"Segundo Parcial"</div>
        <div class="rule rule-bottom"></div>
    </div>
</body>
</html>
