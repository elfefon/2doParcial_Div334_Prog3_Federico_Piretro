<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito - Remeras Deportivas</title>

    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&display=swap" rel="stylesheet">
    <link rel="shortcut icon" href="src/img/favicon.ico" type="image/x-icon">
    <script>
        (function() {
            if (localStorage.getItem("theme") === "dark") {
                document.documentElement.setAttribute("data-theme", "dark");
            }
        })();
    </script>

</head>
<body>

    <header class="header-productos">
        <nav class="navbar-productos">

            <div class="logo-container">
                <img src="src/img/logoPaginaPelota.jpg" class="logo-img" alt="Logo Pelota">
            </div>

            <div class="logo">
                <a href="productos.html" class="mynerve-regular">Remeras deportivas</a>
            </div>

            <button class="theme-toggle" onclick="toggleTheme()" title="Cambiar tema">☾</button>

            <a href="productos.html" class="cart">
                <span>Seguir comprando</span>
            </a>
        </nav>
    </header>

    <main>
        <section class="cart-section">
            <h2>Carrito (<span id="cart-count">0</span> productos)</h2>

            <ul id="cart-items">
                <p class="info-carrito">No hay productos en el carrito.</p>
            </ul>

            <div class="cart-total">
                <p>Total: <span id="total-price">$0.00</span></p>
                <div class="cart-buttons">
	                <button class="hidden delete-button" id="empty-cart" onclick="vaciarCarrito()">Vaciar Carrito</button>
                    <button class="hidden orange-btn" id="btn-imprimir">Imprimir ticket</button>
                </div>
            </div>
        </section>
    </main>
<script>
    function toggleTheme() {
        const html = document.documentElement;
        const btn = document.querySelector(".theme-toggle");
        if (html.getAttribute("data-theme") === "dark") {
            html.removeAttribute("data-theme");
            localStorage.setItem("theme", "light");
            btn.textContent = "\u263E";
        } else {
            html.setAttribute("data-theme", "dark");
            localStorage.setItem("theme", "dark");
            btn.textContent = "\u2600";
        }
    }
    (function() {
        const btn = document.querySelector(".theme-toggle");
        if (document.documentElement.getAttribute("data-theme") === "dark") {
            btn.textContent = "\u2600";
        } else {
            btn.textContent = "\u263E";
        }
    })();
</script>

    <div class="footer">
        <div class="top-bullet"></div>
        <div class="rule rule-top"></div>
        <div class="eyebrow">Programacion III &middot; UTN FRA</div>
        <div class="title-row">
        <div class="title">Federico Piretro</div>
        </div>
        <div class="tagline">"Segundo Parcial"</div>
        <div class="rule rule-bottom"></div>
    </div>
</body>
<script src="https://unpkg.com/jspdf@latest/dist/jspdf.umd.min.js"></script>
<script defer src="js/carrito.js"></script>
</html>
