<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remeras Deportivas</title>

    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&display=swap" rel="stylesheet">
    <link rel="shortcut icon" href="src/img/favicon.ico" type="image/x-icon">
    <script>
        (function() {
            if (localStorage.getItem("theme") === "dark") {
                document.documentElement.setAttribute("data-theme", "dark");
            }
        })();
    </script>

</head>
<body>

    <header class="header-productos">
        <!-- Navbar -->
        <nav class="navbar-productos">

            <div class="logo-container">
                <img src="src/img/logoPaginaPelota.jpg" class="logo-img" alt="Logo Pelota">
            </div>

            <div class="logo">
                <a href="" class="mynerve-regular">Remeras deportivas</a>
            </div>

            <div class="search-container">
                <button id="search-toggle" class="search-btn">🔍</button>

                <input type="text" id="search-input" placeholder="Buscar..." class="search-bar hidden">
            </div>

            <button class="theme-toggle" onclick="toggleTheme()" title="Cambiar tema">☾</button>

            <a href="carrito.html" class="cart">
                <span>Carrito: <span id="cart-count">0</span> productos</span>
            </a>
        </nav>

    </header>

    <!-- Main Content -->
    <main>
        <section class="products-section">
            <div id="products-welcome">
                <h2 id="saludo-usuario"></h2>
                <h2>No te pierdas nuestras remeras exclusivas!</h2>
            </div>

            <div class="category-filters">
                <button class="filter-btn active" data-categoria="todas" onclick="filtrarCategoria('todas')">Todas</button>
                <button class="filter-btn" data-categoria="local" onclick="filtrarCategoria('local')">Local</button>
                <button class="filter-btn" data-categoria="visitante" onclick="filtrarCategoria('visitante')">Visitante</button>
            </div>

            <div class="product-grid"></div>

            <div id="pagination-controls" class="pagination"></div>
        </section>
    </main>
<script>
    function toggleTheme() {
        const html = document.documentElement;
        const btn = document.querySelector(".theme-toggle");
        if (html.getAttribute("data-theme") === "dark") {
            html.removeAttribute("data-theme");
            localStorage.setItem("theme", "light");
            btn.textContent = "\u263E";
        } else {
            html.setAttribute("data-theme", "dark");
            localStorage.setItem("theme", "dark");
            btn.textContent = "\u2600";
        }
    }
    (function() {
        const btn = document.querySelector(".theme-toggle");
        if (document.documentElement.getAttribute("data-theme") === "dark") {
            btn.textContent = "\u2600";
        } else {
            btn.textContent = "\u263E";
        }
    })();
</script>

    <div class="footer">
        <div class="top-bullet"></div>
        <div class="rule rule-top"></div>
        <div class="eyebrow">Programacion III &middot; UTN FRA</div>
        <div class="title-row">
        <div class="title">Federico Piretro</div>
        </div>
        <div class="tagline">"Segundo Parcial"</div>
        <div class="rule rule-bottom"></div>
    </div>
</body>
<script defer src="js/main.js"></script>
</html>
