<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remeras Deportivas</title>
    <!-- CDN para usar jsPDF -->
    <script src="https://unpkg.com/jspdf@latest/dist/jspdf.umd.min.js"></script>

    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Mynerve&display=swap" rel="stylesheet">
    <link rel="shortcut icon" href="src/img/favicon.ico" type="image/x-icon">
    <script defer src="js/main.js"></script>
</head>
<body>

    <header class="header-productos">
        <!-- Navbar -->
        <nav class="navbar-productos">

            <div class="logo-container">
                <img src="src/img/logoPaginaPelota.jpg" class="logo-img" alt="Logo Pelota">
            </div>

            <div class="logo">
                <a href="" class="mynerve-regular">Remeras deportivas</a>
            </div>

            <div class="search-container">
                <button id="search-toggle" class="search-btn">🔍</button>
                
                <input type="text" id="search-input" placeholder="Buscar..." class="search-bar hidden">
            </div>
            <div class="cart">
                <span>Carrito: <span id="cart-count">0</span> productos</span>
            </div>
        </nav>

    </header>

    <!-- Main Content -->
    <main>
        <section class="products-section">
            <div id="products-welcome">
                <h2 id="saludo-usuario"></h2>
                <h2>No te pierdas nuestras remeras exclusivas!</h2>
            </div>
            <div class="product-grid"></div>
        </section>


        <!-- Cart Section -->
        <section class="cart-section">
            <h2>Carrito</h2>

            <ul id="cart-items">
                <p class="info-carrito">No hay productos en el carrito.</p>
            </ul>

            <div class="cart-total">
                <p>Total: <span id="total-price">$0.00</span></p>
                <div class="cart-buttons">
	                <button class="hidden delete-button" id="empty-cart" onclick="vaciarCarrito()">Vaciar Carrito</button>
                    <button class="hidden orange-btn" id="btn-imprimir">Imprimir ticket</button>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
